<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- jquery 必须 -->
    <script src="js/jquery.js" charset="UTF-8"></script>
    <!-- 条形码 -->
    <script src="js/JsBarcode.all.js" charset="UTF-8"></script>
    <!-- 二维码、条形码 bwip-js -->
    <script src="js/bwip-js.js" charset="UTF-8"></script>
    <!-- 数字转大写 -->
    <script src="js/nzh.js" charset="UTF-8"></script>
    <!-- 颜色选择器 -->
    <script src="js/jquery.minicolors.js" charset="UTF-8"></script>
    <!-- 直接打印(print2)需要 -->
    <script src="js/socket.io.js" charset="UTF-8"></script>
    <!-- toPdf需要 -->
    <script src="js/umd.js" charset="UTF-8"></script>
    <script src="js/jspdf.umd.js" charset="UTF-8"></script>
    <script src="js/html2canvas.js" charset="UTF-8"></script>
    <!-- vue-plugin-hiprint  -->
    <script src="js/vue-plugin-hiprint.js" charset="UTF-8"></script>
    <title>HiprintRenderEngine</title>
</head>
<body>
<!-- 指定脚本在解析页面的同时并行下载，并在页面解析完成后执行。 -->
<script defer>
    // 禁止自动重连打印客户端
    window['vue-plugin-hiprint'].disAutoConnect();

    /**
     * 通过模板 json 和打印数据 json 渲染生成 html 字符串
     * @param templateConfig 模板内容（字符串类型的 JSON）
     * @param printData 打印数据（字符串类型的 JSON）
     * @returns {string} 返回渲染后的 html 字符串
     */
    function generateHtml(templateConfig, printData) {
        // 初始化
        hiprint.init({
            providers: [new window['vue-plugin-hiprint'].defaultElementTypeProvider()]
        });
        // 创建模板并填充数据
        const template = new hiprint.PrintTemplate({template: JSON.parse(templateConfig)});
        // 返回的是 jQuery 对象
        const $html = template.getHtml(JSON.parse(printData));
        // 将 canvas 元素转换为 img 元素（解决 wkhtmltopdf 不支持 canvas 的问题）
        $html.find('canvas').each(function() {
            const canvas = this;
            try {
                const dataUrl = canvas.toDataURL('image/png');
                const img = document.createElement('img');
                img.src = dataUrl;
                img.style.cssText = canvas.style.cssText;
                img.width = canvas.width;
                img.height = canvas.height;
                $(canvas).replaceWith(img);
            } catch (e) {
                console.error('Canvas to image conversion failed:', e);
            }
        });
        // 转成 html 字符串再返回
        return $html[0].outerHTML;
    }

    /**
     * 生成 pdf
     * @param templateConfig 模板内容
     * @param printData 打印数据
     * @param type 生成 pdf 类型： blob（默认） arraybuffer dataurl bloburl dataurlstring pdfobjectnewwindow
     */
    function generatePdf(templateConfig, printData, type) {
        // 初始化
        hiprint.init({
            providers: [new window['vue-plugin-hiprint'].defaultElementTypeProvider()]
        });

        // 创建模板并填充数据
        const template = new hiprint.PrintTemplate({template: JSON.parse(templateConfig)});

        // 打印数据、pdf文件名称、生成参数选项
        template.toPdf(printData, 'output', {isDownload: false, type: type}).then((res) => {
            console.log(res)
            return res;
        });
    }

    /**
     * 获取 HiPrint 的版本
     * @returns {*}
     */
    function getHiprintVersion() {
        return hiprint.version;
    }
</script>
</body>
</html>
